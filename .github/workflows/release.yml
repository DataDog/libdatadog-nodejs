name: Release

on:
  push:
    branches:
      - v0.x

jobs:
  build-test-wasm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate:
          - library_config
          - datadog-js-zstd
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 'Use composite action'
        uses: ./.github/actions/build-test-wasm
        with:
          crate: '${{ matrix.crate }}'

  build:
    uses: Datadog/action-prebuildify/.github/workflows/build.yml@main
    needs: build-test-wasm
    with:
      package-manager: 'yarn'
      cache: false
      min-node-version: 18
      rust: true
      only: darwin-arm64,darwin-x64,linux-arm64,linux-x64

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: npm
    permissions:
      id-token: write  # Required for OIDC
      contents: write
    outputs:
      pkgjson: ${{ steps.pkg.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: chmod -R +x ./prebuilds
      - run: npm publish
      - id: pkg
        run: |
          content=`cat ./package.json | tr '\n' ' '`
          echo "json=$content" >> $GITHUB_OUTPUT
      - run: |
          git tag v${{ fromJson(steps.pkg.outputs.json).version }}
          git push origin v${{ fromJson(steps.pkg.outputs.json).version }}
