name: Release

on:
  push:
    branches:
      - v0.x

jobs:
  build-test-wasm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate:
          - library_config
          - datadog-js-zstd
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: 'Use composite action'
        uses: ./.github/actions/build-test-wasm
        with:
          crate: '${{ matrix.crate }}'

  build:
    uses: Datadog/action-prebuildify/.github/workflows/build.yml@main
    needs: build-test-wasm
    with:
      package-manager: 'yarn'
      cache: false
      min-node-version: 16
      rust: true
      only: darwin-arm64,darwin-x64,linux-arm64,linux-x64

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: npm
    permissions:
      id-token: write  # Required for OIDC
      contents: write
    outputs:
      pkgjson: ${{ steps.pkg.outputs.json }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: chmod -R +x ./prebuilds
      - run: npm publish
      - id: pkg
        run: |
          content=`cat ./package.json | tr '\n' ' '`
          echo "json=$content" >> $GITHUB_OUTPUT
      - run: |
          git tag v${{ fromJson(steps.pkg.outputs.json).version }}
          git push origin v${{ fromJson(steps.pkg.outputs.json).version }}
